name: Build Multi-Platform Releases

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布标签名（如 v1.0.0）。若不填则跳过 Release 发布。'
        required: false
        default: ''
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_name: yunting-windows
          - os: ubuntu-latest
            target: linux
            artifact_name: yunting-linux
          - os: macos-latest
            target: macos
            artifact_name: yunting-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Tk Runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pyinstaller requests

      - name: Build Windows Binary (with icon)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m PyInstaller -F -w -i "${{ github.workspace }}/vtfts-knkbe-001.ico" --noconfirm --clean \
            --distpath "dist/${{ matrix.target }}" \
            --workpath "build/${{ matrix.target }}" \
            --specpath "build/spec/${{ matrix.target }}" \
            "gui.py"

      - name: Build Non-Windows Binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m PyInstaller -F -w --noconfirm --clean \
            --distpath "dist/${{ matrix.target }}" \
            --workpath "build/${{ matrix.target }}" \
            --specpath "build/spec/${{ matrix.target }}" \
            "gui.py"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.target }}/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest

    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        shell: bash
        run: |
          mkdir -p release_files

          if [ -f artifacts/yunting-windows/gui.exe ]; then
            cp artifacts/yunting-windows/gui.exe release_files/YunTing-windows.exe
          fi

          if [ -f artifacts/yunting-linux/gui ]; then
            tar -C artifacts/yunting-linux -czf release_files/YunTing-linux.tar.gz gui
          fi

          if [ -f artifacts/yunting-macos/gui ]; then
            tar -C artifacts/yunting-macos -czf release_files/YunTing-macos.tar.gz gui
          fi

          ls -lh release_files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (github.event_name == 'workflow_dispatch' && inputs.tag_name) || github.ref_name }}
          files: release_files/*
          generate_release_notes: true